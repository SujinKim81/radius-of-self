name: Generate person essay

on:
  schedule:
    # 한국시간 화·목·토 15:30
    - cron: "30 6 * * 2,4,6"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/generate-person.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-person
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate essay
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1' }}
        run: python scripts/generate_person.py

      - name: Commit and push
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "변경 사항이 없습니다."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add article data
          git commit -m "Add essay: ${{ steps.generate.outputs.person_name }}"
          git push

      - name: Show generated page
        run: |
          echo "오늘의 인물: ${{ steps.generate.outputs.person_name }}"
          echo "한 줄 결론: ${{ steps.generate.outputs.summary }}"
          echo "새 글 주소: ${{ steps.generate.outputs.page_url }}"
